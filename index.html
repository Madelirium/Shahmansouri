  <style>
    /* Simple landing page styles for language selection */
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #4c0b0b;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
    }
    .landing-container {
      text-align: center;
    }
    .landing-logo img {
      max-width: 400px;
      width: 80%;
      margin-bottom: 40px;
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.3));
    }
    .language-links {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 60px;
    }
    .language-links a {
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      font-size: 1.2rem;
      padding: 10px 20px;
      position: relative;
    }
    .language-links a::after {
      content: '';
      display: block;
      height: 2px;
      background: rgba(255,255,255,0.3);
      margin-top: 8px;
      transition: background 0.3s;
    }
    .language-links a:hover::after {
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="landing-container">
    <h1 style="position:absolute;left:-9999px;">Shahmansouri language selection</h1>
    <div class="landing-logo">
      <!-- Use the existing logo for brand recognition -->
      <img src="images/logo-shahmansouri-tappeti-verona.webp" alt="Logo Shahmansouri Tappeti Persiani">
    </div>
    <div class="language-links">
      <!-- Links to the Italian and English home pages -->
      <a href="index-it.html">Italiano</a>
      <a href="index-en.html">English</a>
    </div>
  </div>
</body>
